<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "ede19b58-31e9-49a5-b526-550209eb0151",

      notifyButton: {
        enable: false, 
      },
      
      // Configuração do Modal (Slidedown Prompt) em PT-BR
      promptOptions: {
        slidedown: {
          prompts: [
            {
              type: "push",

              text: {
                actionMessage: "Gostaria de receber notificações sobre as atualizações do app?",

              delay: {
                pageViews: 0,
                timeDelay: 2 // Tempo de espera em segundos para o modal aparecer
              }
            }
          ]
        }
      }
    });
  });
</script>

        /* Reset e Configurações Globais */
        * {
            margin: 0;

        /* Container Principal */
        .landing-container {

            display: flex;

            justify-content: flex-start;
        }

        /* Imagem de Fundo */
        .bg-image {

            top: 0;

            width: 100%;

            z-index: 0;
        }

        .overlay {

            top: 0;

        }

        /* Conteúdo de Texto e Botão */
        .content-wrapper {

            width: 100%;
            max-width: 1200px;

            display: flex;

            height: 100%;
        }

        /* Estilo do Texto */
        .text-content {

            margin-bottom: 30px;
        }

        .novelas-tag {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ff4d00;
            letter-spacing: 1px;

            justify-content: center;
            gap: 12px;
            background-color: #ff4d00;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;

            border-radius: 8px;

            border: none;
        }

        .btn-apk:hover {

            width: 28px;

            color: #aaaaaa;
            font-weight: 400;
